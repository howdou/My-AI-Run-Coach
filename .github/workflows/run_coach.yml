name: Daily AI Run Coach

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  analyze_garmin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        # 移除了 requests 模組安裝
        run: pip install garminconnect garth google-genai

      - name: Run Coach Script
        env:
          GARMIN_HASH: ${{ secrets.GARMIN_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 移除了 DISCORD_WEBHOOK_URL
        run: |
          for i in 1 2 3; do
            echo "▶️ 開始第 $i 次嘗試執行教練分析..."
            python coach.py && exit 0
            echo "⚠️ 第 $i 次執行失敗！等待 60 秒後自動重試..."
            sleep 60
          done
          echo "❌ 已經嘗試 3 次皆失敗，請檢查 API 狀態。"
          exit 1

      - name: Commit Files to GitHub
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          # 將新的 latest_report.md 加入追蹤
          git add last_activity_id.txt coach_memory.txt latest_report.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracker, coach memory, and latest report" && git push)
